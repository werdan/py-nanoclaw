services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: nanoclaw-bot
    restart: unless-stopped
    user: "app"
    working_dir: /runtime/sessions
    volumes:
      - ${PWD}/runtime/sessions:/runtime/sessions
      - ${PWD}/runtime/media:/runtime/media
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_USER_ID: ${TELEGRAM_USER_ID}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NANOCLAW_AGENT_URL: ${NANOCLAW_AGENT_URL:-http://agent:8000/message}
      NANOCLAW_AGENT_TIMEOUT_S: ${NANOCLAW_AGENT_TIMEOUT_S:-180}
      NANOCLAW_TASKS_PATH: ${NANOCLAW_TASKS_PATH:-/runtime/sessions/.nanoclaw_tasks.json}
      NANOCLAW_MEDIA_DIR: /runtime/media
      ONECLI_URL: ${ONECLI_URL:-http://onecli:10255}
      ONECLI_API_KEY: ${ONECLI_API_KEY:-}
      # User context: git repo subpath mounted into /work alongside CLAUDE.md.
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}
      USER_CONTEXT_SUBPATH: ${USER_CONTEXT_SUBPATH:-}
    depends_on:
      - agent
      - onecli

  agent:
    build:
      context: .
      dockerfile: container/Dockerfile
    image: ${NANOCLAW_AGENT_IMAGE:-nanoclaw-agent}
    restart: unless-stopped
    user: "app"
    working_dir: /work
    environment:
      NANOCLAW_AGENT_PORT: 8000
      NANOCLAW_TASKS_PATH: ${NANOCLAW_TASKS_PATH:-/runtime/sessions/.nanoclaw_tasks.json}
      NANOCLAW_CWD: /work
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}
      USER_CONTEXT_SUBPATH: ${USER_CONTEXT_SUBPATH:-}
      # OneCLI HTTPS proxy: Claude Code CLI routes API calls through OneCLI gateway.
      ANTHROPIC_API_KEY: placeholder
      HTTP_PROXY: http://x:${ONECLI_AGENT_TOKEN:-placeholder}@onecli:10255
      HTTPS_PROXY: http://x:${ONECLI_AGENT_TOKEN:-placeholder}@onecli:10255
      http_proxy: http://x:${ONECLI_AGENT_TOKEN:-placeholder}@onecli:10255
      https_proxy: http://x:${ONECLI_AGENT_TOKEN:-placeholder}@onecli:10255
      SSL_CERT_FILE: /onecli-data/gateway/ca.pem
      REQUESTS_CA_BUNDLE: /onecli-data/gateway/ca.pem
      NODE_EXTRA_CA_CERTS: /onecli-data/gateway/ca.pem
    volumes:
      - ${PWD}/runtime/sessions:/runtime/sessions
      - ${PWD}/runtime/media:/runtime/media:ro
      - ${PWD}/data/user-context/${USER_CONTEXT_SUBPATH:-}:/work
      - ${PWD}/CLAUDE.md:/work/CLAUDE.md:ro
      - ${PWD}/.claude:/work/.claude:ro
      - onecli-data:/onecli-data:ro
    expose:
      - "8000"
    depends_on:
      - onecli

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: onecli
      POSTGRES_USER: onecli
      POSTGRES_PASSWORD: ${ONECLI_DB_PASSWORD:-onecli}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onecli -d onecli"]
      interval: 3s
      timeout: 5s
      retries: 15

  onecli:
    image: ghcr.io/onecli/onecli:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://onecli:${ONECLI_DB_PASSWORD:-onecli}@postgres:5432/onecli
    networks:
      - default
      - agent
    ports:
      # Bind to loopback only; bot and agents use Docker DNS (onecli:10255).
      - "127.0.0.1:10254:10254"
      - "127.0.0.1:10255:10255"
    volumes:
      - onecli-data:/app/data

  git-sync:
    image: alpine/git
    restart: unless-stopped
    volumes:
      - ${PWD}/data/user-context:/repo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cd /repo
        if [ ! -d .git ]; then
          echo "ERROR: /repo is not a git repository. Clone it on the host first."
          sleep infinity
        fi
        git config user.name "nanoclaw-bot"
        git config user.email "bot@nanoclaw"
        while true; do
          sleep $${GIT_SYNC_INTERVAL_S:-300}
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "auto-sync $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if [ -n "$${GITHUB_PAT:-}" ] && [ -n "$${GITHUB_REPO_URL:-}" ]; then
              REPO_NO_SCHEME="$${GITHUB_REPO_URL#https://}"
              AUTHED_URL="https://$${GITHUB_PAT}@$${REPO_NO_SCHEME}"
              git pull --rebase "$${AUTHED_URL}" main || git rebase --abort
              git push "$${AUTHED_URL}" HEAD:main
            else
              git pull --rebase || git rebase --abort
              git push
            fi
          fi
        done
    environment:
      GIT_SYNC_INTERVAL_S: ${GIT_SYNC_INTERVAL_S:-300}
      GITHUB_PAT: ${GITHUB_PAT:-}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}

volumes:
  onecli-data:
  pgdata:

networks:
  agent:
    name: nanoclaw_agent
