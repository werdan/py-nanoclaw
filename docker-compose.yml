services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: nanoclaw-bot
    restart: unless-stopped
    user: "app"
    working_dir: /runtime/sessions
    volumes:
      - ${PWD}/runtime/sessions:/runtime/sessions
      - ${PWD}/runtime/media:/runtime/media
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_USER_ID: ${TELEGRAM_USER_ID}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NANOCLAW_AGENT_IMAGE: ${NANOCLAW_AGENT_IMAGE:-nanoclaw-agent}
      NANOCLAW_AGENT_TIMEOUT_S: ${NANOCLAW_AGENT_TIMEOUT_S:-180}
      # Isolated network for agent containers (no route to docker-socket-proxy).
      NANOCLAW_DOCKER_NETWORK: ${NANOCLAW_DOCKER_NETWORK:-nanoclaw_agent}
      NANOCLAW_MEDIA_DIR: /runtime/media
      NANOCLAW_DOCKER_HOST_SESSION_DIR: ${PWD}/runtime/sessions
      NANOCLAW_DOCKER_HOST_MEDIA_DIR: ${PWD}/runtime/media
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      ONECLI_URL: ${ONECLI_URL:-http://onecli:10255}
      ONECLI_API_KEY: ${ONECLI_API_KEY:-}
      # Docker volume name for OneCLI data (CA cert for agent MITM trust). Default matches project `nanoclaw`.
      NANOCLAW_ONECLI_DATA_VOLUME: ${NANOCLAW_ONECLI_DATA_VOLUME:-nanoclaw_onecli-data}
    depends_on:
      - docker-socket-proxy
      - onecli

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      VERSION: 1
      PING: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: onecli
      POSTGRES_USER: onecli
      POSTGRES_PASSWORD: ${ONECLI_DB_PASSWORD:-onecli}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onecli -d onecli"]
      interval: 3s
      timeout: 5s
      retries: 15

  onecli:
    image: ghcr.io/onecli/onecli:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://onecli:${ONECLI_DB_PASSWORD:-onecli}@postgres:5432/onecli
    networks:
      - default
      - agent
    ports:
      # Bind to loopback only; bot and agents use Docker DNS (onecli:10255).
      - "127.0.0.1:10254:10254"
      - "127.0.0.1:10255:10255"
    volumes:
      - onecli-data:/app/data

volumes:
  onecli-data:
  pgdata:

networks:
  agent:
    name: nanoclaw_agent
