services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: nanoclaw-bot
    restart: unless-stopped
    user: "app"
    working_dir: /runtime/sessions
    # NOTE: Tier 1.4 hardening (read_only / cap_drop / no-new-privileges /
    # pids_limit) is intentionally NOT applied to the bot yet — it broke
    # python-telegram-bot's startup with `httpx.ConnectError: [Errno -2]
    # Name or service not known` on every initial getMe(). DNS works inside
    # the container after boot (verified with `socket.gethostbyname` and
    # `httpx.get`), so the failure is specific to telegram.ext.Application
    # initialization under the sandbox. Tracked for follow-up; the bot's
    # threat surface is small (no Bash exposure, no MCP tools), so the
    # short-term gap is acceptable while the agent — the actual injection
    # target — keeps the full sandbox. Restore once root-caused.
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    volumes:
      - ${PWD}/runtime/sessions:/runtime/sessions
      - ${PWD}/runtime/media:/runtime/media
      # CA cert for the OneCLI HTTPS proxy (used only by the OpenAI client;
      # Telegram client still goes direct, see nanoclaw/openai_client.py).
      - onecli-data:/onecli-data:ro
      # Tier 1.3: per-consumer creds-broker socket. Bot can call only the bot
      # ops; the agent gets a separate socket on a different volume.
      - bot-creds-socket:/run/creds:rw
    environment:
      # TELEGRAM_BOT_TOKEN is read from the creds-broker socket below; this env
      # var is only used as a local-dev fallback if NANOCLAW_BOT_BROKER_SOCKET
      # isn't reachable.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_USER_ID: ${TELEGRAM_USER_ID}
      NANOCLAW_BOT_BROKER_SOCKET: /run/creds/sock
      # OPENAI_API_KEY intentionally NOT set: bot constructs its OpenAI
      # client through the OneCLI proxy (Tier 1.1 follow-up). OneCLI injects
      # the real key on outbound api.openai.com requests. The .env can keep
      # OPENAI_API_KEY as a local-dev fallback if you don't run OneCLI.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NANOCLAW_AGENT_URL: ${NANOCLAW_AGENT_URL:-http://agent:8000/message}
      NANOCLAW_AGENT_TIMEOUT_S: ${NANOCLAW_AGENT_TIMEOUT_S:-180}
      NANOCLAW_TASKS_PATH: ${NANOCLAW_TASKS_PATH:-/runtime/sessions/.nanoclaw_tasks.json}
      NANOCLAW_MEDIA_DIR: /runtime/media
      ONECLI_URL: ${ONECLI_URL:-http://onecli:10255}
      ONECLI_API_KEY: ${ONECLI_API_KEY:-}
      ONECLI_AGENT_TOKEN: ${ONECLI_AGENT_TOKEN:-}
      # User context: git repo subpath mounted into /work.
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}
      USER_CONTEXT_SUBPATH: ${USER_CONTEXT_SUBPATH:-}
    depends_on:
      - agent
      - onecli
      - creds-broker

  agent:
    build:
      context: .
      dockerfile: container/Dockerfile
    image: ${NANOCLAW_AGENT_IMAGE:-nanoclaw-agent}
    restart: unless-stopped
    user: "app"
    working_dir: /work
    # Hardened runtime (Tier 1.4). The agent is the most-injected surface so
    # this is the strongest sandbox: rootfs read-only, all caps dropped,
    # privilege escalation blocked. /work, /runtime/sessions, .claude, and
    # the OneCLI CA bind mounts below stay writable / readable as needed.
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    tmpfs:
      - /tmp
      # Cover all of HOME — the bundled Claude Code CLI (bun runtime) writes
      # to several paths under $HOME (.config, .local, debug logs) that we
      # can't enumerate up front. Granular .cache + .claude tmpfs wasn't
      # enough; CLI hung silently on appendFileSync ENOENT to a path we
      # hadn't covered. mode=1777 + sticky bit so the unprivileged `app` UID
      # can write here even though tmpfs roots are root-owned by default.
      - /home/app:mode=1777
    environment:
      NANOCLAW_AGENT_PORT: 8000
      NANOCLAW_TASKS_PATH: ${NANOCLAW_TASKS_PATH:-/runtime/sessions/.nanoclaw_tasks.json}
      # Tier 1.3: agent fetches Google OAuth access tokens from the creds-broker
      # over a Unix socket. The refresh-token file is no longer mounted into the
      # agent. NANOCLAW_GOOGLE_CREDS_PATH stays as a local-dev fallback.
      NANOCLAW_AGENT_BROKER_SOCKET: /run/creds/sock
      NANOCLAW_GOOGLE_CREDS_PATH: ${NANOCLAW_GOOGLE_CREDS_PATH:-/runtime/sessions/.nanoclaw_google_creds.json}
      NANOCLAW_CWD: /work
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}
      USER_CONTEXT_SUBPATH: ${USER_CONTEXT_SUBPATH:-}
      # OneCLI HTTPS proxy: Claude Code CLI routes API calls through OneCLI gateway.
      # Set exactly one of CLAUDE_CODE_OAUTH_TOKEN / ANTHROPIC_API_KEY — the CLI
      # prefers the API key when both are present, so leaving the unused one set
      # causes the CLI to take the wrong auth path. Store the matching credential
      # type in OneCLI (oauth vs api key) and uncomment accordingly.
      CLAUDE_CODE_OAUTH_TOKEN: placeholder
      # ANTHROPIC_API_KEY: placeholder
      HTTP_PROXY: http://x:${ONECLI_AGENT_TOKEN:-placeholder}@onecli:10255
      HTTPS_PROXY: http://x:${ONECLI_AGENT_TOKEN:-placeholder}@onecli:10255
      http_proxy: http://x:${ONECLI_AGENT_TOKEN:-placeholder}@onecli:10255
      https_proxy: http://x:${ONECLI_AGENT_TOKEN:-placeholder}@onecli:10255
      SSL_CERT_FILE: /onecli-data/gateway/ca.pem
      REQUESTS_CA_BUNDLE: /onecli-data/gateway/ca.pem
      NODE_EXTRA_CA_CERTS: /onecli-data/gateway/ca.pem
    volumes:
      - ${PWD}/runtime/sessions:/runtime/sessions
      - ${PWD}/runtime/media:/runtime/media:ro
      - ${PWD}/data/user-context/${USER_CONTEXT_SUBPATH:-}:/work
      - ${PWD}/.claude:/work/.claude:rw
      - onecli-data:/onecli-data:ro
      # Tier 1.3: agent's per-consumer creds-broker socket. Distinct volume
      # from bot's so a compromised agent cannot ask the broker for the
      # Telegram bot token (op denied at the bot socket only).
      - agent-creds-socket:/run/creds:rw
    expose:
      - "8000"
    depends_on:
      - onecli
      - creds-broker

  creds-broker:
    # Tier 1.3 sidecar. Owns the high-value secrets (Google OAuth refresh
    # tokens, Telegram bot token) and vends short-lived access tokens to
    # consumers over per-consumer Unix sockets. The bot and agent never read
    # the underlying secret files directly — refresh tokens stay inside this
    # container's filesystem only.
    build:
      context: .
      dockerfile: container/creds_broker/Dockerfile
    image: nanoclaw-creds-broker
    restart: unless-stopped
    user: "broker"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    tmpfs:
      - /tmp:size=4m
      - /home/broker:mode=1777,size=4m
    volumes:
      # Read-only: secret files live here. Owned by `broker` UID on host;
      # mode 0600 each. Move runtime/sessions/.nanoclaw_google_creds.json
      # here as `secrets/google-oauth-creds.json` and add a one-line
      # `secrets/telegram-bot-token` file.
      - ${PWD}/secrets:/secrets:ro
      # Per-consumer sockets — broker creates one socket on each volume,
      # consumers mount only their corresponding volume.
      - agent-creds-socket:/run/agent-creds
      - bot-creds-socket:/run/bot-creds
    expose: []

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: onecli
      POSTGRES_USER: onecli
      POSTGRES_PASSWORD: ${ONECLI_DB_PASSWORD:-onecli}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onecli -d onecli"]
      interval: 3s
      timeout: 5s
      retries: 15

  onecli:
    image: ghcr.io/onecli/onecli:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://onecli:${ONECLI_DB_PASSWORD:-onecli}@postgres:5432/onecli
    networks:
      - default
      - agent
    ports:
      # Bind to loopback only; bot and agents use Docker DNS (onecli:10255).
      - "127.0.0.1:10254:10254"
      - "127.0.0.1:10255:10255"
    volumes:
      - onecli-data:/app/data

  git-sync:
    image: alpine/git
    restart: unless-stopped
    volumes:
      - ${PWD}/data/user-context:/repo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cd /repo
        if [ ! -d .git ]; then
          echo "ERROR: /repo is not a git repository. Clone it on the host first."
          sleep infinity
        fi
        git config --global --add safe.directory /repo
        git config user.name "nanoclaw-bot"
        git config user.email "bot@nanoclaw"
        while true; do
          sleep $${GIT_SYNC_INTERVAL_S:-300}
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "auto-sync $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if [ -n "$${GITHUB_PAT:-}" ] && [ -n "$${GITHUB_REPO_URL:-}" ]; then
              REPO_NO_SCHEME="$${GITHUB_REPO_URL#https://}"
              AUTHED_URL="https://$${GITHUB_PAT}@$${REPO_NO_SCHEME}"
              git pull --rebase "$${AUTHED_URL}" main || git rebase --abort
              git push "$${AUTHED_URL}" HEAD:main
            else
              git pull --rebase || git rebase --abort
              git push
            fi
          fi
        done
    environment:
      GIT_SYNC_INTERVAL_S: ${GIT_SYNC_INTERVAL_S:-300}
      GITHUB_PAT: ${GITHUB_PAT:-}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}

volumes:
  onecli-data:
  pgdata:
  # Tier 1.3 per-consumer creds-broker sockets. Each is an empty named volume
  # the broker mounts RW (creates a socket file inside) and the corresponding
  # consumer (bot or agent) mounts the same volume to find that socket.
  agent-creds-socket:
  bot-creds-socket:

networks:
  agent:
    name: nanoclaw_agent
